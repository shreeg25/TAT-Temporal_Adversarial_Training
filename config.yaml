# ==========================================================
# TAT-MNAT ARCHITECTURE CONFIGURATION
# ==========================================================

paths:
  # The strict root directory for the raw, unpoisoned dataset
  mot17_train: "data/MOT17/train"
  
  # Output directories
  paths:
  weights_out: "weights/tat_hardened_mnat_epoch_10.pth" # <-- Point it to the actual brain.
  figures_out: "outputs/figures/"
  trackeval_out: "TrackEval/data/trackers/mot_challenge/MOT17-train/"

training:
  batch_size: 4
  num_epochs: 10
  learning_rate: 0.005
  momentum: 0.9
  weight_decay: 0.0005

adversarial_bounds:
  # Pre-calibrated epsilon constraints for normalized tensors [0, 1]
  L_inf: 0.03137  # Approx 8/255 (Distributed noise)
  L_2: 1.5        # Euclidean energy bound
  L_1: 0.1        # Top-K sparse magnitude (Sticker effect)
  L_1_sparsity: 0.05 # Only corrupt 5% of pixels

system:
  device: "cuda"  # Do not attempt this on a CPU
  num_workers: 4